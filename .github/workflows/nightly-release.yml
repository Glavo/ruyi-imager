name: Nightly Release

on:
  workflow_dispatch:
  schedule:
    # 02:00 Asia/Shanghai.
    - cron: "0 18 * * *"

permissions:
  contents: write

concurrency:
  group: nightly-release
  cancel-in-progress: true

env:
  GRADLE_USER_HOME: ${{ github.workspace }}/.gradle-user-home
  GRADLE_OPTS: >-
    --enable-native-access=ALL-UNNAMED
    --add-exports=java.base/jdk.internal.misc=ALL-UNNAMED
    --add-opens=java.base/jdk.internal.misc=ALL-UNNAMED
  WIX_VERSION: 6.0.2
  NIGHTLY_TAG: nightly
  NIGHTLY_RELEASE_NAME: Nightly Build

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-x86_64
            runner: windows-2025
          - platform: linux-x86_64
            runner: ubuntu-24.04
          - platform: linux-aarch64
            runner: ubuntu-24.04-arm
          - platform: macos-x86_64
            runner: macos-15-intel
          - platform: macos-aarch64
            runner: macos-15

    steps:
      - name: Check out sources
        uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"

      - name: Make Gradle wrapper executable
        if: runner.os != 'Windows'
        run: chmod +x ./gradlew

      - name: Select Rust stable toolchain
        run: rustup default stable

      - name: Install WiX
        if: startsWith(matrix.platform, 'windows-')
        run: |
          dotnet tool install --tool-path "$env:RUNNER_TEMP\wix" wix --version "$env:WIX_VERSION"
          & "$env:RUNNER_TEMP\wix\wix.exe" extension add --global "WixToolset.UI.wixext/$env:WIX_VERSION"
          & "$env:RUNNER_TEMP\wix\wix.exe" extension add --global "WixToolset.BootstrapperApplications.wixext/$env:WIX_VERSION"
          "$env:RUNNER_TEMP\wix" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build jlink archive
        run: ./gradlew "-Pruyi.commitVersion=true" "-Pruyi.commit=${{ github.sha }}" "-Pjlink.jdk.platform=${{ matrix.platform }}" :app:jlinkArchive

      - name: Build MSI package
        if: startsWith(matrix.platform, 'windows-')
        run: ./gradlew "-Pruyi.commitVersion=true" "-Pruyi.commit=${{ github.sha }}" "-Pjlink.jdk.platform=${{ matrix.platform }}" :app:jlinkMsi

      - name: Build setup executable
        if: startsWith(matrix.platform, 'windows-')
        run: ./gradlew "-Pruyi.commitVersion=true" "-Pruyi.commit=${{ github.sha }}" "-Pjlink.jdk.platform=${{ matrix.platform }}" :app:jlinkSetupExe

      - name: Build Debian package
        if: startsWith(matrix.platform, 'linux-')
        run: ./gradlew "-Pruyi.commitVersion=true" "-Pruyi.commit=${{ github.sha }}" "-Pjlink.jdk.platform=${{ matrix.platform }}" :app:jlinkDeb

      - name: Collect release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          shopt -s nullglob
          assets=(
            app/build/distributions/ruyi-imager-*-${{ matrix.platform }}.zip
            app/build/distributions/ruyi-imager-*-${{ matrix.platform }}.tar.gz
          )
          if [ "${#assets[@]}" -ne 1 ]; then
            printf 'Expected exactly one archive for %s, found %s\n' "${{ matrix.platform }}" "${#assets[@]}" >&2
            printf 'Matched assets:\n' >&2
            printf '  %s\n' "${assets[@]}" >&2
            exit 1
          fi
          cp "${assets[0]}" release-assets/
          if [[ "${{ matrix.platform }}" == windows-* ]]; then
            setups=(app/build/distributions/ruyi-imager-*-${{ matrix.platform }}-setup.exe)
            if [ "${#setups[@]}" -ne 1 ]; then
              printf 'Expected exactly one setup executable for %s, found %s\n' "${{ matrix.platform }}" "${#setups[@]}" >&2
              printf 'Matched setup executables:\n' >&2
              printf '  %s\n' "${setups[@]}" >&2
              exit 1
            fi
            cp "${setups[0]}" release-assets/
          fi
          if [[ "${{ matrix.platform }}" == linux-* ]]; then
            debs=(app/build/distributions/ruyi-imager-*-${{ matrix.platform }}.deb)
            if [ "${#debs[@]}" -ne 1 ]; then
              printf 'Expected exactly one Debian package for %s, found %s\n' "${{ matrix.platform }}" "${#debs[@]}" >&2
              printf 'Matched Debian packages:\n' >&2
              printf '  %s\n' "${debs[@]}" >&2
              exit 1
            fi
            cp "${debs[0]}" release-assets/
          fi

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: nightly-${{ matrix.platform }}
          path: release-assets/*
          if-no-files-found: error

  publish:
    name: Update nightly release
    needs: build
    runs-on: ubuntu-24.04

    steps:
      - name: Check out sources
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download workflow artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-assets
          merge-multiple: true

      - name: Write release notes
        run: |
          set -euo pipefail
          mkdir -p release-meta
          {
            echo "# Nightly Build"
            echo
            echo "Updated at: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            echo
            echo "Source commit: ${GITHUB_SHA}"
            echo
            echo "Assets:"
            find release-assets -maxdepth 1 -type f -printf "- %f\n" | sort
          } > release-meta/nightly-notes.md

      - name: Move nightly tag
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f "${NIGHTLY_TAG}" "${GITHUB_SHA}"
          git push --force origin "refs/tags/${NIGHTLY_TAG}"

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if gh release view "${NIGHTLY_TAG}" >/dev/null 2>&1; then
            gh release edit "${NIGHTLY_TAG}" \
              --title "${NIGHTLY_RELEASE_NAME}" \
              --notes-file release-meta/nightly-notes.md \
              --prerelease
          else
            gh release create "${NIGHTLY_TAG}" \
              --title "${NIGHTLY_RELEASE_NAME}" \
              --notes-file release-meta/nightly-notes.md \
              --prerelease \
              --verify-tag
          fi

      - name: Replace release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          find release-assets -maxdepth 1 -type f -printf '%f\n' | sort > release-meta/local-assets.txt
          gh release view "${NIGHTLY_TAG}" --json assets --jq '.assets[].name' > release-meta/existing-assets.txt
          gh release upload "${NIGHTLY_TAG}" release-assets/* --clobber
          while IFS= read -r asset; do
            if [ -n "${asset}" ] && ! grep -Fxq "${asset}" release-meta/local-assets.txt; then
              gh release delete-asset "${NIGHTLY_TAG}" "${asset}" --yes
            fi
          done < release-meta/existing-assets.txt
